services:
    app:
        user: "1000:1000"
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - '.:/var/www'
        networks:
            - app
        depends_on:
            - mysql
    nginx:
        image: nginx:alpine
        ports:
            - '${APP_PORT}:80'
        volumes:
            - .:/var/www
            - ./docker/nginx:/etc/nginx/conf.d/
        networks:
            - app
    mysql:
        image: 'mysql/mysql-server:8.0'
        ports:
            - '${FORWARD_DB_PORT:-3320}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'mysql:/var/lib/mysql'
        networks:
            - app
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    node:
        image: node:22
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - app
        tty: true            
networks:
    app:
        driver: bridge
volumes:
    mysql:
        driver: local
